
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
  <title>GitHub Issues Tracker</title>
</head>

<body class="bg-gray-100">

  <header class="bg-white shadow-md">
    <nav class="flex flex-col md:flex-row justify-between items-center p-4 md:p-6 max-w-[1200px] mx-auto gap-4">
      <div class="flex items-center gap-2">
        <img class="w-8" src="./assets/github-logo.png" alt="logo">
        <h2 class="font-bold text-lg">GitHub Issues Tracker</h2>
      </div>

      <div class="flex flex-col sm:flex-row items-center gap-3 w-full md:w-auto">
        <div class="relative w-full sm:w-auto">
          <input id="searchInput" type="search" placeholder="Search Issue"
            class="border px-10 py-2 rounded-lg outline-none w-full">
          <i class="fa-solid fa-magnifying-glass absolute left-3 top-3 text-gray-400"></i>
        </div>
        <button id="searchBtn"
          class="bg-blue-600 text-white px-5 py-2 rounded-lg hover:bg-purple-700 flex items-center justify-center gap-2 w-full sm:w-auto transition-colors">
          <i class="fa-solid fa-plus"></i>
          Search
        </button>
      </div>
    </nav>
  </header>

  <main class="max-w-[1110px] mx-auto my-6 md:my-10 px-4">
    <section class="flex gap-2 mb-8 overflow-x-auto pb-2 sm:pb-0 scrollbar-hide">
      <button id="btn-all"
        class="flex-none px-6 md:px-8 py-2 rounded-md font-medium border border-gray-200 bg-[#4A00FF] text-white">
        All
      </button>
      <button id="btn-open"
        class="flex-none px-6 md:px-8 py-2 rounded-md font-medium border border-gray-200 bg-white text-gray-600">
        Open
      </button>
      <button id="btn-closed"
        class="flex-none px-6 md:px-8 py-2 rounded-md font-medium border border-gray-200 bg-white text-gray-600">
        Closed
      </button>
    </section>

    <section
      class="flex flex-col sm:flex-row justify-between items-center p-4 md:p-6 border border-gray-200 rounded-t-xl bg-white shadow-sm gap-4 text-center sm:text-left">
      <div class="flex flex-col sm:flex-row items-center gap-4">
        <div class="p-2 bg-indigo-100 rounded-full">
          <img src="./assets/Aperture.png" alt="icon" class="w-6">
        </div>
        <div>
          <h1 id="issueCountDisplay" class="text-lg md:text-xl font-bold">0 Issues</h1>
          <p class="text-gray-500 text-xs md:text-sm">Track and manage your project issues</p>
        </div>
      </div>
      <div class="flex gap-6">
        <div class="flex items-center gap-2">
          <span class="w-3 h-3 rounded-full bg-green-500"></span>
          <span class="text-xs md:text-sm font-medium">Open</span>
        </div>
        <div class="flex items-center gap-2">
          <span class="w-3 h-3 rounded-full bg-purple-500"></span>
          <span class="text-xs md:text-sm font-medium">Closed</span>
        </div>
      </div>
    </section>

    <div id="loader" class="hidden py-20 text-center text-indigo-600 font-bold">Loading...</div>

    <div id="issuesContainer"
      class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 p-4 md:p-6 border-x border-b border-gray-200 rounded-b-xl bg-gray-50 min-h-[200px]">
    </div>
  </main>

  <div id="modalContainer"></div>
  <script src="issue.js"></script>
</body>

</html>
