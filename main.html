<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- DaisyUI -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />

  <!-- Tailwind -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />

  <title>GitHub Issues Tracker</title>
</head>

<body class="bg-gray-100">

  <!-- Header -->
  <header class="bg-white shadow-md">
    <nav class="flex justify-between items-center p-6 max-w-[1200px] mx-auto">

      <div class="flex items-center gap-2">
        <img class="w-8" src="./assets/github-logo.png" alt="">
        <h2 class="font-bold text-lg">GitHub Issues Tracker</h2>
      </div>

      <div class="flex items-center gap-3">

        <div class="relative">
          <input type="search" placeholder="Search Issue" class="border px-10 py-2 rounded-lg outline-none">
          <i class="fa-solid fa-magnifying-glass absolute left-3 top-3 text-gray-400"></i>
        </div>

        <button class="bg-blue-600 text-white px-5 py-2 rounded-lg hover:bg-purple-700 flex items-center gap-2">
          <i class="fa-solid fa-plus"></i>
          Search
        </button>

      </div>

    </nav>
  </header>


  
  <script src="issue.js"></script>

</body>

</html>
