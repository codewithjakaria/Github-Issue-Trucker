
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- DaisyUI -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />

  <!-- Tailwind -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <title>GitHub Issues Tracker</title>
</head>

<body class="bg-[#F8FAFC] flex items-center justify-center min-h-screen px-4">

  <main class="w-full max-w-[520px] bg-white shadow-xl rounded-xl p-6 sm:p-10">

    <div class="text-center space-y-2 sm:space-y-3">

      <img class="mx-auto w-14 sm:w-20" src="./assets/github-logo.png" alt="logo">

      <h1 class="text-xl sm:text-2xl font-bold text-gray-800">
        GitHub Issues Tracker
      </h1>

      <p class="text-gray-500 text-xs sm:text-sm">
        Sign in to manage your issues
      </p>

    </div>

    <div class="mt-6 sm:mt-8 space-y-4 sm:space-y-5">

      <div>
        <label class="text-sm font-medium">Username</label>

        <input type="text" placeholder="Enter Username" class="input input-bordered w-full mt-1" />

        <p class="text-xs text-purple-800 mt-1">Default: admin</p>
      </div>

      <div>
        <label class="text-sm font-medium">Password</label>

        <input type="password" placeholder="Enter Password" class="input input-bordered w-full mt-1" />

        <p class="text-xs text-purple-800 mt-1">Default: admin123</p>
      </div>


      
      <button class="w-full py-3 rounded-lg text-white font-semibold bg-[#4A00FF]">

        Sign In

      </button>

      <div class="flex items-center gap-3">

        <div class="flex-1 border-t"></div>
        <span class="text-xs sm:text-sm text-gray-400">OR</span>
        <div class="flex-1 border-t"></div>

      </div>

      <div class="bg-gray-100 rounded-lg p-3 sm:p-4 text-center text-sm">

        <p class="text-gray-500 mb-2">Demo Credentials:</p>

        <p class="font-medium text-sm">Username: admin</p>
        <p class="font-medium text-sm">Password: admin123</p>

      </div>

    </div>

  </main>

</body>

</html>
